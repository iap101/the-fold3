<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#f4f0e7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="The Fold" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>The Fold</title>
</head>
<body data-theme="newspaper">
  <main class="shell">
    <header class="masthead">
      <div>
        <div class="eyebrow">THE FOLD</div>
        <h1 id="greeting">Good evening.</h1>
        <p id="dateLabel"></p><p id="updatedLabel" class="updatedLabel"></p>
      </div>
      <div class="themeSwitch" aria-label="Theme selector">
        <button id="paperBtn" class="active">Paper</button>
        <button id="dashboardBtn">Dashboard</button>
      </div>
    </header>

    <section class="summaryCard">
      <div><span>Today’s edition</span><strong id="storyCount">Loading…</strong></div>
      <div><span>Estimated reading</span><strong id="readMinutes">—</strong></div>
      <div><span>Completed</span><strong id="completedCount">0/0</strong></div>
    </section>

    <nav class="sectionNav" id="sectionNav"></nav>
    <div id="status" class="loading">Preparing today’s edition…</div>
    <div id="sections"></div>

    <section class="finish">
      <div class="check">✓</div>
      <h2 id="finishTitle">That’s enough for now.</h2>
      <p>Close the page and enjoy the rest of your day.</p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
